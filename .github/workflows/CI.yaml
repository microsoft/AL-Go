name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Test:
    strategy:
      matrix:
        include:
          - os: windows-latest
            shell: powershell
            psVersion: PS5
          - os: ubuntu-latest
            shell: pwsh
            psVersion: PS7
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: Run tests on ${{ matrix.os }} (${{ matrix.psVersion }})
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Harden Runner
        if: github.repository_owner == 'microsoft'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify AL-Go runs on github.com
        run: |
          $serverHost = ([Uri]$env:GITHUB_SERVER_URL).Host
          if ($serverHost -ne 'github.com') {
            Write-Host "::error::AL-Go for GitHub itself must run on github.com (detected host '$serverHost'). Developing/running the AL-Go repository on GitHub Enterprise (GHE) is not supported. Note that repositories using AL-Go for GitHub are supported on GHE - this restriction only applies to the AL-Go for GitHub repository itself."
            exit 1
          }

      - name: Run AL-Go Actions Tests (${{ matrix.psVersion }})
        run: |
          . (Join-Path "." "Tests/runtests.ps1") -Path "Tests"

      - name: Test AL-Go Workflows (${{ matrix.psVersion }})
        if: github.repository_owner == 'microsoft'
        run: |
          . (Join-Path "." "Tests/runtests.ps1") -Path "Tests/WorkflowSanitation"

      - name: Test aka.ms links in markdown files (${{ matrix.psVersion }})
        if: github.repository_owner == 'microsoft'
        run: |
          . (Join-Path "." "Tests/runtests.ps1") -Path "Tests/MarkdownLinks"
