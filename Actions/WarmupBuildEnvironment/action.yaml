name: Warmup Build Environment
author: Microsoft Corporation
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  artifact:
    description: ArtifactUrl to use for the build
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: run
      shell: ${{ inputs.shell }}
      env:
        _artifact: ${{ inputs.artifact }}
      run: |
        ${{ github.action_path }}/../Invoke-AlGoAction.ps1 -ActionName "WarmupBuildEnvironment" -Action {
          ${{ github.action_path }}/WarmupBuildEnvironment.ps1 -artifact $ENV:_artifact
        }
branding:
  icon: terminal
  color: blue
