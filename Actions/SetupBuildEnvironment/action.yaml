name: Setup Build Environment
author: Microsoft Corporation
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  project:
    description: Project folder
    required: false
    default: '.'
  artifact:
    description: ArtifactUrl to use for the build
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: run
      shell: ${{ inputs.shell }}
      env:
        _project: ${{ inputs.project }}
        _artifact: ${{ inputs.artifact }}
      run: |
        ${{ github.action_path }}/../Invoke-AlGoAction.ps1 -ActionName "SetupBuildEnvironment" -Action {
          ${{ github.action_path }}/SetupBuildEnvironment.ps1 -project $ENV:_project -artifact $ENV:_artifact
        }
branding:
  icon: terminal
  color: blue
