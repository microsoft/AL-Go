name: Upload Artifact
author: Microsoft Corporation
description: Uploads an artifact with automatic retry on transient failures
inputs:
  name:
    description: Artifact name
    required: true
  path:
    description: Path to the file or directory to upload
    required: true
  if-no-files-found:
    description: Action to take if no files are found (warn, error, ignore)
    required: false
    default: 'warn'
  retention-days:
    description: Number of days to retain the artifact
    required: false
    default: '0'
runs:
  using: composite
  steps:
    - name: Upload artifact (attempt 1)
      id: attempt1
      continue-on-error: true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}

    - name: Wait before retry
      if: steps.attempt1.outcome == 'failure'
      shell: pwsh
      run: Start-Sleep -Seconds 60

    - name: Upload artifact (attempt 2)
      id: attempt2
      if: steps.attempt1.outcome == 'failure'
      continue-on-error: true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Wait before final retry
      if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
      shell: pwsh
      run: Start-Sleep -Seconds 100

    - name: Upload artifact (attempt 3)
      if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}
        overwrite: true
branding:
  icon: upload
  color: blue
