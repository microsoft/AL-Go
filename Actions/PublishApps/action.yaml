name: Publish Apps
author: Microsoft Corporation
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  token:
    description: The GitHub token running the action
    required: false
    default: ${{ github.token }}
  project:
    description: Project folder
    required: false
    default: '.'
  installAppsJson:
    description: A path to a JSON-formatted list of apps to install
    required: false
    default: ''
  installTestAppsJson:
    description: A path to a JSON-formatted list of test apps to install
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: run
      shell: ${{ inputs.shell }}
      env:
        _token: ${{ inputs.token }}
        _project: ${{ inputs.project }}
        _installAppsJson: ${{ inputs.installAppsJson }}
        _installTestAppsJson: ${{ inputs.installTestAppsJson }}
      run: |
        ${{ github.action_path }}/../Invoke-AlGoAction.ps1 -ActionName "PublishApps" -Action {
          ${{ github.action_path }}/PublishApps.ps1 -token $ENV:_token -project $ENV:_project -installAppsJson $ENV:_installAppsJson -installTestAppsJson $ENV:_installTestAppsJson
        }
branding:
  icon: terminal
  color: blue
