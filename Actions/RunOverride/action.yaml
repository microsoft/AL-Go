name: Run AL-Go Override
author: Microsoft Corporation
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  project:
    description: Project folder
    required: false
    default: '.'
  overrideName:
    description: Name of the override to run (must match a name in the AL-Go-native overrides allow-list)
    required: true
  parametersJson:
    description: Compressed JSON string with parameters to pass to the override script as a hashtable
    required: false
    default: '{}'
runs:
  using: composite
  steps:
    - name: run
      shell: ${{ inputs.shell }}
      env:
        _project: ${{ inputs.project }}
        _overrideName: ${{ inputs.overrideName }}
        _parametersJson: ${{ inputs.parametersJson }}
      run: |
        ${{ github.action_path }}/../Invoke-AlGoAction.ps1 -ActionName "RunOverride" -Action {
          ${{ github.action_path }}/RunOverride.ps1 -project $env:_project -overrideName $env:_overrideName -parametersJson $env:_parametersJson
        }
branding:
  icon: terminal
  color: blue
