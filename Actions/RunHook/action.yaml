name: Run AL-Go Hook
author: Microsoft Corporation
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  project:
    description: Project folder
    required: false
    default: '.'
  hookName:
    description: Name of the hook to run (must match a name in the AL-Go hooks allow-list)
    required: true
  parametersJson:
    description: Compressed JSON string with parameters to pass to the hook script as a hashtable
    required: false
    default: '{}'
runs:
  using: composite
  steps:
    - name: run
      shell: ${{ inputs.shell }}
      env:
        _project: ${{ inputs.project }}
        _hookName: ${{ inputs.hookName }}
        _parametersJson: ${{ inputs.parametersJson }}
      run: |
        ${{ github.action_path }}/../Invoke-AlGoAction.ps1 -ActionName "RunHook" -Action {
          ${{ github.action_path }}/RunHook.ps1 -project $env:_project -hookName $env:_hookName -parametersJson $env:_parametersJson
        }
branding:
  icon: terminal
  color: blue
