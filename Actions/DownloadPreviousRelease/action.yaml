name: Download Previous Release
author: Microsoft Corporation
description: Downloads the latest release apps for use as a baseline in AppSourceCop validation and upgrade testing.
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  project:
    description: Project folder
    required: false
    default: '.'
outputs:
  PreviousAppsPath:
    description: Path to the folder containing the downloaded previous release apps. Empty if no release was found.
    value: ${{ steps.DownloadPreviousRelease.outputs.PreviousAppsPath }}
runs:
  using: composite
  steps:
    - name: Download Previous Release
      shell: ${{ inputs.shell }}
      id: DownloadPreviousRelease
      env:
        _token: ${{ github.token }}
        _project: ${{ inputs.project }}
      run: |
        ${{ github.action_path }}/../Invoke-AlGoAction.ps1 -ActionName "Download Previous Release" -Action {
          ${{ github.action_path }}/DownloadPreviousRelease.ps1 -token $ENV:_token -project $ENV:_project
        }
branding:
  icon: terminal
  color: blue
